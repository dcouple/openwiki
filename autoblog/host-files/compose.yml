services:
  autoblog:
    image: ghcr.io/dcouple/openwiki:latest
    pull_policy: if_not_present
    env_file: .env
    volumes:
      - autoblog_agent:/agent
      - autoblog_claude:/home/autoblog/.claude
      - autoblog_ssh:/etc/ssh
      - autoblog_site:/site
      - autoblog_vault:/vault
      - autoblog_vault_remote:/vault-remote.git
    ports:
      - "${SSH_BIND:-127.0.0.1}:2222:22"
      - "${DEV_BIND:-127.0.0.1}:4321:4321"
    healthcheck:
      test: ["CMD", "test", "-f", "/var/run/autoblog-ready"]
      interval: 10s
      timeout: 3s
      retries: 60
      start_period: 5m
    restart: unless-stopped

  caddy:
    image: caddy:2
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - autoblog_site:/srv/site:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "${CADDY_BIND:-127.0.0.1}:${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_BIND:-127.0.0.1}:${CADDY_HTTPS_PORT:-8443}:443"
    depends_on:
      autoblog:
        condition: service_healthy
    restart: unless-stopped

volumes:
  autoblog_agent:
  autoblog_claude:
  autoblog_ssh:
  autoblog_site:
  autoblog_vault:
  autoblog_vault_remote:
  caddy_data:
  caddy_config:
